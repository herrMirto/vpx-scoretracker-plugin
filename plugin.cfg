[configuration]
id = "ScoreTracker"
name = "ScoreTracker"
description = "Tracks scores of played games using PinMAME NVRAM maps and records them to a scores.json file"
author = "Andre Santana"
version = "0.1.4"
link = "https://github.com/herrMirto/vpx-scoretracker-plugin"

[libraries]
windows.x86 = "scoretracker-plugin.dll"
windows.x64 = "scoretracker-plugin.dll"
windows.arm64 = "scoretracker-plugin.dll"
linux.x64 = "scoretracker-plugin.so"
linux.aarch64 = "scoretracker-plugin.so"
macos.x64 = "scoretracker-plugin.dylib"
macos.arm64 = "scoretracker-plugin.dylib"
