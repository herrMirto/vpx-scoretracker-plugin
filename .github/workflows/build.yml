name: Build ScoreTracker VPX Plugin

on:
  push:
    branches: [main, "feat/*"]
    paths-ignore:
      - README.md
      - pages/**
      - .github/workflows/pages.yml
      # A page-only release still carries synchronized version metadata, but
      # should deploy Pages without rebuilding every application artifact.
      - .github/workflows/build.yml
      - VERSION
      - plugin.cfg
      - installer/Cargo.toml
      - installer/Cargo.lock
      - companion/package.json
      - companion/package-lock.json
      - companion/src-tauri/Cargo.toml
      - companion/src-tauri/Cargo.lock
      - companion/src-tauri/tauri.conf.json
  pull_request:
    paths-ignore:
      - README.md
      - pages/**
      - .github/workflows/pages.yml
      - .github/workflows/build.yml
      - VERSION
      - plugin.cfg
      - installer/Cargo.toml
      - installer/Cargo.lock
      - companion/package.json
      - companion/package-lock.json
      - companion/src-tauri/Cargo.toml
      - companion/src-tauri/Cargo.lock
      - companion/src-tauri/tauri.conf.json
  workflow_dispatch:
    inputs:
      publish_release:
        description: Build installers and publish the VERSION as a GitHub release
        required: false
        type: boolean
        default: false
  workflow_call:

env:
  VPINBALL_REPO: https://github.com/vpinball/vpinball.git
  VPINBALL_REF: master
  PINMAME_REPO: https://github.com/vbousquet/pinmame.git
  NVRAM_MAPS_REPO: https://github.com/herrMirto/pinmame-nvram-maps.git
  NVRAM_MAPS_SHA: 2d886188712fe434a94910dafeb0cea27d539448

jobs:
  resolve-vpx:
    name: Resolve VPX compatibility revision
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      vpx_sha: ${{ steps.revisions.outputs.vpx_sha }}
      pinmame_sha: ${{ steps.revisions.outputs.pinmame_sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Verify package versions
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            python3 scripts/check-version.py --tag "$GITHUB_REF_NAME"
          else
            python3 scripts/check-version.py
          fi

      - name: Resolve VPX and PinMAME revisions
        id: revisions
        shell: bash
        run: |
          VPX_SHA=$(git ls-remote "${{ env.VPINBALL_REPO }}" "refs/heads/${{ env.VPINBALL_REF }}" | cut -f1)
          if [ -z "$VPX_SHA" ]; then
            echo "error: could not resolve VPX ${{ env.VPINBALL_REF }}" >&2
            exit 1
          fi
          PINMAME_SHA=$(curl --fail --silent --show-error \
            "https://raw.githubusercontent.com/vpinball/vpinball/$VPX_SHA/platforms/config.sh" \
            | sed -n 's/^PINMAME_SHA=//p')
          if [ -z "$PINMAME_SHA" ]; then
            echo "error: PINMAME_SHA not found for VPX $VPX_SHA" >&2
            exit 1
          fi
          echo "VPX_SHA=$VPX_SHA"
          echo "PINMAME_SHA=$PINMAME_SHA"
          echo "vpx_sha=$VPX_SHA" >> "$GITHUB_OUTPUT"
          echo "pinmame_sha=$PINMAME_SHA" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: resolve-vpx
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            runner: windows-2022
            platform: windows
            arch: x64
            artifact: scoretracker-installer-windows-x64.exe
          - label: Linux x64
            runner: ubuntu-22.04
            platform: linux
            arch: x64
            artifact: scoretracker-installer-linux-x64
          - label: Linux ARM64
            runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            artifact: scoretracker-installer-linux-arm64
          - label: macOS ARM64
            runner: macos-15
            platform: macos
            arch: arm64
            artifact: scoretracker-installer-macos-arm64.dmg
    runs-on: ${{ matrix.runner }}
    env:
      VPINBALL_SHA: ${{ needs.resolve-vpx.outputs.vpx_sha }}
      PINMAME_SHA: ${{ needs.resolve-vpx.outputs.pinmame_sha }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python for map validation
        if: matrix.platform != 'windows'
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Fetch pinned NVRAM maps
        shell: bash
        run: |
          git clone --filter=blob:none --no-checkout "${{ env.NVRAM_MAPS_REPO }}" nvram-maps-src
          git -C nvram-maps-src config core.autocrlf false
          git -C nvram-maps-src fetch --depth 1 origin "${{ env.NVRAM_MAPS_SHA }}"
          git -C nvram-maps-src checkout --detach "${{ env.NVRAM_MAPS_SHA }}"
          test -f nvram-maps-src/index.json
          test -d nvram-maps-src/maps
          test -d nvram-maps-src/platforms
          test -f nvram-maps-src/LICENSE

      - name: Validate pinned NVRAM maps
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          cd nvram-maps-src
          python tools/update-index.py
          git diff --ignore-space-at-eol --exit-code -- index.json
          git checkout -- index.json

      - name: Clone VPX
        shell: bash
        run: |
          git clone --filter=blob:none --no-checkout "${{ env.VPINBALL_REPO }}" vpinball-src
          git -C vpinball-src fetch --depth 1 origin "$VPINBALL_SHA"
          git -C vpinball-src checkout --detach "$VPINBALL_SHA"

      - name: Build PinMAME (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          git clone --filter=blob:none --no-checkout "${{ env.PINMAME_REPO }}" pinmame-src
          git -C pinmame-src fetch --depth 1 origin "$env:PINMAME_SHA"
          git -C pinmame-src checkout --detach "$env:PINMAME_SHA"
          Copy-Item pinmame-src/cmake/libpinmame/CMakeLists.txt pinmame-src/CMakeLists.txt
          cmake -S pinmame-src -B pinmame-src/build -G "Visual Studio 17 2022" -A x64 -DPLATFORM=win -DARCH=x64 -DBUILD_SHARED=ON -DBUILD_STATIC=OFF
          cmake --build pinmame-src/build --config Release
          $thirdPartyRoot = 'vpinball-src/third-party'
          New-Item -ItemType Directory -Force -Path "$thirdPartyRoot/include", "$thirdPartyRoot/build-libs/windows-x64", "$thirdPartyRoot/runtime-libs/windows-x64"
          Copy-Item pinmame-src/src/libpinmame/libpinmame.h vpinball-src/third-party/include/
          Copy-Item pinmame-src/build/Release/pinmame64.lib vpinball-src/third-party/build-libs/windows-x64/
          Copy-Item pinmame-src/build/Release/pinmame64.dll vpinball-src/third-party/runtime-libs/windows-x64/

      - name: Build PinMAME (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          git clone --filter=blob:none --no-checkout "${{ env.PINMAME_REPO }}" pinmame-src
          git -C pinmame-src fetch --depth 1 origin "$PINMAME_SHA"
          git -C pinmame-src checkout --detach "$PINMAME_SHA"
          cp pinmame-src/cmake/libpinmame/CMakeLists.txt pinmame-src/CMakeLists.txt
          cmake -S pinmame-src -B pinmame-src/build \
            -DPLATFORM="${{ matrix.platform }}" \
            -DARCH="${{ matrix.arch }}" \
            -DBUILD_STATIC=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build pinmame-src/build
          mkdir -p vpinball-src/third-party/include "vpinball-src/third-party/runtime-libs/${{ matrix.platform }}-${{ matrix.arch }}"
          cp pinmame-src/src/libpinmame/libpinmame.h vpinball-src/third-party/include/
          if [ "${{ matrix.platform }}" = macos ]; then
            cp pinmame-src/build/libpinmame.dylib "vpinball-src/third-party/runtime-libs/${{ matrix.platform }}-${{ matrix.arch }}/"
          else
            cp pinmame-src/build/libpinmame.so "vpinball-src/third-party/runtime-libs/${{ matrix.platform }}-${{ matrix.arch }}/"
          fi

      - name: Add ScoreTracker to the VPX source tree
        shell: bash
        run: |
          mkdir -p vpinball-src/plugins/scoretracker
          cp ScoreTrackerPlugin.cpp NvramTracker.cpp NvramTracker.h ScoresFileWriter.cpp ScoresFileWriter.h common.cpp common.h plugin.cfg vpinball-src/plugins/scoretracker/
          cp CMakeLists_plugin_ScoreTracker.txt vpinball-src/make/
          cat > vpinball-src/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.19)
          project(scoretracker-plugin)
          set(CMAKE_CXX_STANDARD 20)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          set(BUILD_SHARED ON)
          set(PLATFORM "${{ matrix.platform }}")
          set(ARCH "${{ matrix.arch }}")
          set(PLUGINS_DIR "${CMAKE_BINARY_DIR}/plugins_output")
          set(SCORETRACKER_FETCH_MAPS OFF CACHE BOOL "" FORCE)
          include("${CMAKE_SOURCE_DIR}/make/CMakeLists_plugin_ScoreTracker.txt")
          EOF

      - name: Build plugin (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          cmake -S vpinball-src -B vpinball-src/build -G "Visual Studio 17 2022" -A x64
          cmake --build vpinball-src/build --target ScoreTrackerPlugin --config Release

      - name: Build plugin (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          cmake -S vpinball-src -B vpinball-src/build -DCMAKE_BUILD_TYPE=Release
          cmake --build vpinball-src/build --target ScoreTrackerPlugin --config Release

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install installer UI build dependencies (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev

      - name: Test installer
        shell: bash
        run: cargo test --manifest-path installer/Cargo.toml

      - name: Set up Node for the companion app
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install companion build dependencies (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libxdo-dev

      - name: Build companion app (VPX Scoretracker Viewer)
        shell: bash
        run: |
          cd companion
          npm ci
          if [ "${{ matrix.platform }}" = windows ]; then
            npm run tauri build -- --no-bundle
          elif [ "${{ matrix.platform }}" = macos ]; then
            npm run tauri build -- --bundles app
          else
            # The outer ScoreTracker installer is already the single-file
            # package. Embed the raw Tauri binary so it uses the target
            # system's matching GLib/WebKitGTK stack at runtime.
            npm run tauri build -- --no-bundle
          fi

      - name: Stage embedded installer payload
        shell: bash
        run: |
          mkdir -p installer-payload/scoretracker/maps
          cp -R vpinball-src/build/plugins_output/scoretracker/. installer-payload/scoretracker/
          cp nvram-maps-src/index.json nvram-maps-src/LICENSE installer-payload/scoretracker/maps/
          cp -R nvram-maps-src/maps nvram-maps-src/platforms installer-payload/scoretracker/maps/
          printf '{\n  "repository": "%s",\n  "commit": "%s"\n}\n' \
            "${{ env.NVRAM_MAPS_REPO }}" "${{ env.NVRAM_MAPS_SHA }}" \
            > installer-payload/scoretracker/maps/source.json
          if [ "${{ matrix.platform }}" = windows ]; then
            cp companion/src-tauri/target/release/vpx-scoretracker-viewer.exe installer-payload/
          elif [ "${{ matrix.platform }}" = macos ]; then
            cp -R "companion/src-tauri/target/release/bundle/macos/VPX Scoretracker Viewer.app" installer-payload/
          else
            cp companion/src-tauri/target/release/vpx-scoretracker-viewer installer-payload/
          fi

      - name: Compile self-contained installer
        shell: bash
        run: SCORETRACKER_PAYLOAD_DIR="$PWD/installer-payload" cargo build --release --manifest-path installer/Cargo.toml

      - name: Package single-file installer
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.platform }}" = windows ]; then
            cp installer/target/release/scoretracker-installer.exe "dist/${{ matrix.artifact }}"
          elif [ "${{ matrix.platform }}" = macos ]; then
            APP="dmg-root/ScoreTracker Installer.app"
            mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
            cp installer/target/release/scoretracker-installer "$APP/Contents/MacOS/"
            cp installer/macos/Info.plist "$APP/Contents/"
            cp companion/src-tauri/icons/icon.icns "$APP/Contents/Resources/"
            chmod +x "$APP/Contents/MacOS/scoretracker-installer"
            codesign --force --deep --sign - "$APP"
            hdiutil create \
              -volname "ScoreTracker Installer" \
              -srcfolder dmg-root \
              -ov \
              -format UDZO \
              "dist/${{ matrix.artifact }}"
          else
            cp installer/target/release/scoretracker-installer "dist/${{ matrix.artifact }}"
            chmod +x "dist/${{ matrix.artifact }}"
          fi

      - name: Upload installer
        if: github.event_name != 'schedule'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          archive: false

  release:
    name: Publish GitHub release
    needs: [resolve-vpx, build]
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          python3 scripts/check-version.py
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Require a new release version
        env:
          RELEASE_TAG: ${{ steps.release_version.outputs.tag }}
        shell: bash
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "::error::Release tag $RELEASE_TAG already exists. Bump VERSION before pushing to main."
            exit 1
          fi

      - name: Download installers
        uses: actions/download-artifact@v8
        with:
          pattern: scoretracker-installer-*
          path: dist
          merge-multiple: true

      - name: Generate update compatibility manifest
        env:
          SCORETRACKER_VERSION: ${{ steps.release_version.outputs.version }}
          VPX_SHA: ${{ needs.resolve-vpx.outputs.vpx_sha }}
          PINMAME_SHA: ${{ needs.resolve-vpx.outputs.pinmame_sha }}
        shell: bash
        run: |
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          assets = []
          for path in sorted(Path("dist").glob("scoretracker-installer-*")):
              assets.append({
                  "name": path.name,
                  "size": path.stat().st_size,
                  "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
              })

          manifest = {
              "schemaVersion": 1,
              "version": os.environ["SCORETRACKER_VERSION"].removeprefix("v"),
              "channel": "stable",
              "repository": "herrMirto/vpx-scoretracker-plugin",
              "compatibility": {
                  "vpxRef": "master",
                  "vpxCommit": os.environ["VPX_SHA"],
                  "pinmameCommit": os.environ["PINMAME_SHA"],
              },
              "assets": assets,
          }
          Path("dist/update-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ScoreTracker ${{ steps.release_version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/scoretracker-installer-*
            dist/update-manifest.json
